experiment:
  name: ""  # If empty, auto-generate: {model_abbrev}_N{pop}_G{gen}_R{runs}_{sel}_{MMDD}_{HHMM}
  runs: 1   # Number of independent runs (>=1). pass@k computed when >1.

llm:
  generation_model: "gpt-4o-mini"
  mutation_model: "gpt-4o-mini"
  analysis_model: "gpt-4o-mini"
  formal_repair_model: "gpt-4o-mini"
  temperature:
    generation: 1.0
    mutation: 0.8
    repair: 0.3
  top_p: 0.95
  max_retries: 3
  retry_delay: 5

evolution:
  population_size: 10
  offspring_count: 10
  max_generations: 10
  repair_attempts: 3
  gate:
    theta_min: 0.75
    theta_max: 1.0
    annealing_exponent: 2.0
    fallback_percentile: 0.25
    fallback_margin: 0.05
  ucb:
    exploration_coeff: 2.0
    softmax_temperature: 1.0
    initial_reward: 0.5
  synth_failure_mode: "keep"   # "keep" = preserve correctness score; "zero" = set to 0
  best_metric: "adp"           # "area", "delay", "power", "adp" (area*delay), "pdp" (power*delay), "adpwr" (area*delay*power)
  parallel_workers: 10          # 1 = sequential (default), >1 = parallel offspring evaluation
  selection:
    strategy: "proportional"  # or "sequential"
    intra_level_sort_by: "correctness"
    crossover_donor_count: 3
  # Near-miss support (disabled by default; RTLLM runs unaffected).
  # Enable for VerilogEval to help LLM escape near-miss plateaus [threshold, 1.0).
  near_miss_mode:
    enabled: False           # Master switch. false -> new code paths are all short-circuited.
    repair_threshold: 0.90   # Treat correctness in [0.90, 1.0) as a near miss.
    repair_attempts: 3       # Extra repair iterations per near-miss individual, each with a different strategy hint.
    explore_boost: True     # Blend explore-heavy distribution into selector when best is stuck near-miss.
    persistent_gens:  3      # Only boost after N consecutive near-miss generations.

initialization:
  strategies:
    - "behavioral"
    - "structural"
    - "pipeline"
    - "resource_shared"
    - "fsm_minimized"
  auto_select_strategies: true

evaluation:
  correctness:
    use_enhanced_testbench: true
    use_original_testbench: false
    simulation_timeout: 120
    simulator: "iverilog"
    # Focused error_feedback for VerilogEval bucket-scored TBs.
    # When enabled, only the top-K highest-miss buckets (+ matching first-fail samples)
    # are passed to the LLM. RTLLM uses FORGE_CHECK early-return and is not affected.
    focused_feedback:
      enabled: True
      top_k: 2
  ppa:
    synthesis_tool: "yosys"
    timing_power_tool: "opensta"
    liberty_file: "/home/hping/OpenROAD-flow-scripts/flow/platforms/nangate45/lib/NangateOpenCellLibrary_typical.lib"
    default_clock_period: 10
    timeout: 90
  formal:
    enabled: false
    tool: "symbiyosys"
    timeout: 60
    max_candidates_per_gen: 3
    min_correctness_for_formal: 0.90
    min_ppa_percentile: 0.70

strategy_memory:
  enabled: true
  max_entries: 30
  inject_top_k: 3
  scope: "per_design"

design_overrides:
  skip_ppa_synthesis:
    - "clkgenerator"

paths:
  rtllm_root: "~/MAS4RTL/RTLLM"
  verilogeval_root: "~/MAS4RTL/VerilogEval"
  results_dir: "~/MAS4RTL/coevo/results"
  yosys_binary: "yosys"
  iverilog_binary: "iverilog"
  vvp_binary: "vvp"
  opensta_binary: "sta"
  symbiyosys_binary: "sby"

logging:
  level: "INFO"
  save_all_candidates: false
  save_pareto_candidates: true
  log_api_costs: true
